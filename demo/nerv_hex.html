<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NERV</title>
    <style>
        /* ═══════════════════════════════════════════════════════════════════════════════
           ACTUAL EVA UI - HEXAGONS, NOT RECTANGLES
           Everything is angular. No clean 90° corners anywhere.
           ═══════════════════════════════════════════════════════════════════════════════ */
        
        :root {
            --black: #000000;
            --white: #FFFFFF;
            --green: #00FF41;
            --red: #FF0000;
            --cyan: #00FFFF;
            --orange: #FF6600;
            --dim: #666666;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* CRT */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
            pointer-events: none;
            z-index: 9999;
        }
        
        /* ═════════════════════════════════════════════════════════════════
           HEXAGON PSYCHOGRAPH - The main display
           ═════════════════════════════════════════════════════════════════ */
        
        .main-display {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Central hexagon frame */
        .hex-frame {
            position: relative;
            width: 400px;
            height: 462px; /* 400 * 1.155 for flat-top hex */
        }
        
        .hex-frame svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* Hexagon outline */
        .hex-border {
            fill: none;
            stroke: var(--white);
            stroke-width: 2;
        }
        
        .hex-border-inner {
            fill: none;
            stroke: var(--dim);
            stroke-width: 1;
        }
        
        /* Header bar inside hexagon (angular) */
        .hex-header {
            fill: rgba(255,0,0,0.3);
            stroke: var(--red);
            stroke-width: 1;
        }
        
        /* Wave display area */
        .wave-area {
            fill: rgba(0,0,0,0.8);
            stroke: var(--dim);
            stroke-width: 0.5;
        }
        
        /* ═════════════════════════════════════════════════════════════════
           SURROUNDING ANGULAR PANELS
           ═════════════════════════════════════════════════════════════════ */
        
        .side-panel {
            position: absolute;
            /* Chamfered corners via clip-path */
            clip-path: polygon(10px 0%, calc(100% - 10px) 0%, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0% calc(100% - 10px), 0% 10px);
        }
        
        .panel-left {
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 200px;
            height: 400px;
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--white);
        }
        
        .panel-right {
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 200px;
            height: 400px;
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--white);
        }
        
        /* ═════════════════════════════════════════════════════════════════
           HEXAGONAL STATUS CELLS
           ═════════════════════════════════════════════════════════════════ */
        
        .hex-grid {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .hex-cell {
            position: absolute;
            width: 60px;
            height: 52px;
            /* Flat-top hexagon shape */
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            background: rgba(20,20,20,0.9);
            border: 1px solid var(--dim);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 8px;
        }
        
        .hex-cell.active {
            background: rgba(0,255,65,0.1);
            border-color: var(--green);
        }
        
        .hex-cell.warning {
            background: rgba(255,102,0,0.1);
            border-color: var(--orange);
        }
        
        .hex-cell.danger {
            background: rgba(255,0,0,0.1);
            border-color: var(--red);
        }
        
        .hex-cell-label {
            color: var(--dim);
            font-size: 6px;
        }
        
        .hex-cell-value {
            color: var(--white);
            font-size: 10px;
            font-weight: bold;
        }
        
        .hex-cell-value.green { color: var(--green); }
        .hex-cell-value.orange { color: var(--orange); }
        .hex-cell-value.red { color: var(--red); }
        
        /* ═════════════════════════════════════════════════════════════════
           TOP BAR - Angular header
           ═════════════════════════════════════════════════════════════════ */
        
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            /* Trapezoidal shape */
            clip-path: polygon(0 0, 100% 0, 100% 45px, calc(100% - 30px) 100%, 30px 100%, 0 45px);
            background: linear-gradient(180deg, rgba(100,0,0,0.8) 0%, rgba(0,0,0,0.9) 100%);
            border-bottom: 2px solid var(--red);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
        }
        
        .nerv-logo {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 8px;
        }
        
        .nerv-logo span {
            color: var(--red);
        }
        
        .top-status {
            font-size: 10px;
            color: var(--dim);
        }
        
        .top-status span {
            color: var(--green);
        }
        
        /* ═════════════════════════════════════════════════════════════════
           BOTTOM BAR - Angular footer
           ═════════════════════════════════════════════════════════════════ */
        
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            clip-path: polygon(30px 0, calc(100% - 30px) 0, 100% 100%, 0 100%);
            background: var(--black);
            border-top: 2px solid var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .pattern-indicator {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 24px;
            background: rgba(0,255,255,0.1);
            border: 1px solid var(--cyan);
        }
        
        .pattern-dot {
            width: 12px;
            height: 12px;
            background: var(--cyan);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--cyan); }
            50% { opacity: 0.5; }
        }
        
        .pattern-text {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--cyan);
        }
        
        .pattern-alert {
            color: var(--red);
            font-size: 12px;
            font-weight: bold;
            animation: blink 0.5s infinite;
        }
        
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        
        /* ═════════════════════════════════════════════════════════════════
           SYNC DISPLAY - Large central
           ═════════════════════════════════════════════════════════════════ */
        
        .sync-display {
            text-align: center;
            padding: 16px;
        }
        
        .sync-value {
            font-size: 72px;
            font-weight: bold;
            color: var(--green);
            line-height: 1;
        }
        
        .sync-label {
            font-size: 10px;
            color: var(--dim);
            letter-spacing: 3px;
        }
        
        /* ═════════════════════════════════════════════════════════════════
           HEXAGONAL CLUSTER (Skill Graph)
           ═════════════════════════════════════════════════════════════════ */
        
        .skill-hex-cluster {
            position: absolute;
        }
        
        /* ═════════════════════════════════════════════════════════════════
           CORNER DECORATIONS
           ═════════════════════════════════════════════════════════════════ */
        
        .corner-decor {
            position: absolute;
            width: 100px;
            height: 100px;
        }
        
        .corner-decor.top-left { top: 60px; left: 0; }
        .corner-decor.top-right { top: 60px; right: 0; transform: scaleX(-1); }
        .corner-decor.bottom-left { bottom: 40px; left: 0; transform: scaleY(-1); }
        .corner-decor.bottom-right { bottom: 40px; right: 0; transform: scale(-1); }
        
        /* ═════════════════════════════════════════════════════════════════
           ROTATION ANIMATION
           ═════════════════════════════════════════════════════════════════ */
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .rotating {
            animation: rotate 8s linear infinite;
        }
    </style>
</head>
<body>
    <div class="main-display">
        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="nerv-logo">NER<span>V</span></div>
            <div class="top-status">
                SYSTEM: <span>NOMINAL</span> | PATTERN: <span style="color:var(--cyan)">BLUE</span> | <span id="clock">00:00:00</span>
            </div>
        </div>
        
        <!-- CORNER DECORATIONS -->
        <svg class="corner-decor top-left" viewBox="0 0 100 100">
            <path d="M 0 0 L 100 0 L 100 10 L 10 10 L 10 100 L 0 100 Z" fill="none" stroke="var(--white)" stroke-width="1"/>
            <path d="M 20 20 L 80 20 L 80 25 L 25 25 L 25 80 L 20 80 Z" fill="none" stroke="var(--dim)" stroke-width="0.5"/>
        </svg>
        <svg class="corner-decor top-right" viewBox="0 0 100 100">
            <path d="M 0 0 L 100 0 L 100 10 L 10 10 L 10 100 L 0 100 Z" fill="none" stroke="var(--white)" stroke-width="1"/>
            <path d="M 20 20 L 80 20 L 80 25 L 25 25 L 25 80 L 20 80 Z" fill="none" stroke="var(--dim)" stroke-width="0.5"/>
        </svg>
        <svg class="corner-decor bottom-left" viewBox="0 0 100 100">
            <path d="M 0 0 L 100 0 L 100 10 L 10 10 L 10 100 L 0 100 Z" fill="none" stroke="var(--white)" stroke-width="1"/>
        </svg>
        <svg class="corner-decor bottom-right" viewBox="0 0 100 100">
            <path d="M 0 0 L 100 0 L 100 10 L 10 10 L 10 100 L 0 100 Z" fill="none" stroke="var(--white)" stroke-width="1"/>
        </svg>
        
        <!-- LEFT PANEL - Hexagonal status cells -->
        <div class="panel-left side-panel" style="padding: 12px;">
            <!-- Hexagonal cells arranged vertically -->
            <div style="position: relative; height: 100%;">
                <div class="hex-cell active" style="left: 50%; top: 10px; transform: translateX(-50%);">
                    <span class="hex-cell-label">SYNC</span>
                    <span class="hex-cell-value green">94.2%</span>
                </div>
                <div class="hex-cell" style="left: 50%; top: 68px; transform: translateX(-50%);">
                    <span class="hex-cell-label">UNIT</span>
                    <span class="hex-cell-value">01</span>
                </div>
                <div class="hex-cell warning" style="left: 50%; top: 126px; transform: translateX(-50%);">
                    <span class="hex-cell-label">PWR</span>
                    <span class="hex-cell-value orange">47%</span>
                </div>
                <div class="hex-cell active" style="left: 50%; top: 184px; transform: translateX(-50%);">
                    <span class="hex-cell-label">AT</span>
                    <span class="hex-cell-value green">OK</span>
                </div>
                <div class="hex-cell active" style="left: 50%; top: 242px; transform: translateX(-50%);">
                    <span class="hex-cell-label">PILOT</span>
                    <span class="hex-cell-value">IKARI</span>
                </div>
                <div class="hex-cell active" style="left: 50%; top: 300px; transform: translateX(-50%);">
                    <span class="hex-cell-label">PULSE</span>
                    <span class="hex-cell-value green">118</span>
                </div>
            </div>
        </div>
        
        <!-- RIGHT PANEL - MAGI + Target -->
        <div class="panel-right side-panel" style="padding: 12px;">
            <!-- MAGI Display -->
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 10px; letter-spacing: 2px; margin-bottom: 8px;">MAGI</div>
                <div style="display: flex; justify-content: center; gap: 16px;">
                    <div style="text-align: center;">
                        <div style="width: 30px; height: 30px; border: 2px solid var(--orange); border-radius: 50%; margin: 0 auto; position: relative;">
                            <div style="position: absolute; inset: 8px; background: var(--orange); border-radius: 50%;"></div>
                        </div>
                        <div style="font-size: 7px; color: var(--dim); margin-top: 4px;">CASPAR</div>
                        <div style="font-size: 6px; color: var(--orange);">賛成</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="width: 30px; height: 30px; border: 2px solid var(--green); border-radius: 50%; margin: 0 auto; position: relative;">
                            <div style="position: absolute; inset: 8px; background: var(--green); border-radius: 50%;"></div>
                        </div>
                        <div style="font-size: 7px; color: var(--dim); margin-top: 4px;">MELCHIOR</div>
                        <div style="font-size: 6px; color: var(--green);">賛成</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="width: 30px; height: 30px; border: 2px solid var(--cyan); border-radius: 50%; margin: 0 auto; position: relative;">
                            <div style="position: absolute; inset: 8px; background: var(--cyan); border-radius: 50%;"></div>
                        </div>
                        <div style="font-size: 7px; color: var(--dim); margin-top: 4px;">BALTHASAR</div>
                        <div style="font-size: 6px; color: var(--cyan);">賛成</div>
                    </div>
                </div>
                <div style="font-size: 10px; color: var(--green); margin-top: 8px; font-weight: bold;">承認</div>
            </div>
            
            <!-- Hexagonal Target -->
            <div style="text-align: center;">
                <svg viewBox="0 0 120 120" style="width: 120px; height: 120px;">
                    <polygon points="60,10 100,33 100,87 60,110 20,87 20,33" fill="none" stroke="var(--white)" stroke-width="2"/>
                    <g class="rotating" style="transform-origin: 60px 60px;">
                        <polygon points="60,22 85,37 85,83 60,98 35,83 35,37" fill="none" stroke="var(--green)" stroke-width="1" stroke-dasharray="3,2"/>
                    </g>
                    <line x1="50" y1="60" x2="70" y2="60" stroke="var(--green)" stroke-width="1"/>
                    <line x1="60" y1="50" x2="60" y2="70" stroke="var(--green)" stroke-width="1"/>
                    <circle cx="60" cy="60" r="2" fill="var(--green)"/>
                </svg>
                <div style="font-size: 10px; font-weight: bold;">ANGEL-04</div>
                <div style="font-size: 8px; color: var(--dim);">2,847m | 047°</div>
                <div style="font-size: 9px; color: var(--green);">追跡中</div>
            </div>
        </div>
        
        <!-- CENTRAL HEXAGON FRAME - Psychograph -->
        <div class="hex-frame">
            <svg viewBox="0 0 400 462">
                <!-- Outer hexagon -->
                <polygon class="hex-border" points="200,0 400,115.5 400,346.5 200,462 0,346.5 0,115.5"/>
                
                <!-- Inner hexagon border -->
                <polygon class="hex-border-inner" points="200,20 380,125 380,337 200,442 20,337 20,125"/>
                
                <!-- Header section (angular) -->
                <path class="hex-header" d="M 60 50 L 340 50 L 360 80 L 360 110 L 40 110 L 40 80 Z"/>
                <text x="200" y="85" text-anchor="middle" fill="var(--white)" font-size="14" font-weight="bold" letter-spacing="4">PSYCHOGRAPH</text>
                <text x="200" y="100" text-anchor="middle" fill="var(--dim)" font-size="10">心理図</text>
                
                <!-- Wave display areas - arranged vertically -->
                <!-- Wave 1: A-10 NERVE -->
                <rect class="wave-area" x="50" y="130" width="300" height="50"/>
                <text x="60" y="145" fill="var(--dim)" font-size="8">A-10</text>
                <text x="60" y="155" fill="var(--green)" font-size="6">神経</text>
                <path fill="none" stroke="var(--white)" stroke-width="1" d="M 100 155 Q 120 140 140 155 T 180 155 T 220 155 T 260 155 T 300 155 T 340 155">
                    <animate attributeName="d"
                        values="M 100 155 Q 120 140 140 155 T 180 155 T 220 155 T 260 155 T 300 155 T 340 155;
                                M 100 155 Q 120 170 140 155 T 180 155 T 220 150 T 260 160 T 300 155 T 340 155;
                                M 100 155 Q 120 140 140 155 T 180 155 T 220 155 T 260 155 T 300 155 T 340 155"
                        dur="1.5s" repeatCount="indefinite"/>
                </path>
                
                <!-- Wave 2: SYNC -->
                <rect class="wave-area" x="50" y="190" width="300" height="50"/>
                <text x="60" y="205" fill="var(--dim)" font-size="8">SYNC</text>
                <text x="60" y="215" fill="var(--green)" font-size="6">同期</text>
                <path fill="none" stroke="var(--orange)" stroke-width="1" d="M 100 215 L 130 215 L 135 200 L 140 230 L 145 215 L 180 215 L 185 205 L 190 225 L 195 215 L 240 215 L 340 215">
                    <animate attributeName="d"
                        values="M 100 215 L 130 215 L 135 200 L 140 230 L 145 215 L 180 215 L 185 205 L 190 225 L 195 215 L 240 215 L 340 215;
                                M 100 215 L 130 217 L 135 203 L 140 227 L 145 213 L 180 217 L 185 207 L 190 223 L 195 217 L 240 215 L 340 215;
                                M 100 215 L 130 213 L 135 197 L 140 233 L 145 217 L 180 213 L 185 203 L 190 227 L 195 213 L 240 215 L 340 215"
                        dur="0.3s" repeatCount="indefinite"/>
                </path>
                
                <!-- SYNC RATIO - Large central display -->
                <text x="200" y="300" text-anchor="middle" fill="var(--green)" font-size="64" font-weight="bold">94.2%</text>
                <text x="200" y="320" text-anchor="middle" fill="var(--dim)" font-size="10" letter-spacing="2">SYNC RATIO // 同期率</text>
                
                <!-- Skill Graph mini display -->
                <rect class="wave-area" x="50" y="340" width="300" height="80"/>
                <text x="60" y="355" fill="var(--dim)" font-size="8">SKILL GRAPH</text>
                <text x="60" y="365" fill="var(--green)" font-size="6">スキルグラフ</text>
                
                <!-- Mini skill nodes -->
                <g transform="translate(200, 390)">
                    <circle cx="-60" cy="-20" r="8" fill="var(--black)" stroke="var(--green)"/>
                    <circle cx="-30" cy="-20" r="10" fill="var(--black)" stroke="var(--green)"/>
                    <circle cx="0" cy="-20" r="8" fill="var(--black)" stroke="var(--dim)"/>
                    <circle cx="30" cy="-20" r="8" fill="var(--black)" stroke="var(--dim)"/>
                    <circle cx="60" cy="-20" r="8" fill="var(--black)" stroke="var(--green)"/>
                    <circle cx="-45" cy="10" r="8" fill="var(--black)" stroke="var(--green)"/>
                    <circle cx="0" cy="10" r="10" fill="var(--black)" stroke="var(--green)"/>
                    <circle cx="45" cy="10" r="8" fill="var(--black)" stroke="var(--red)"/>
                    <!-- Links -->
                    <line x1="-52" y1="-20" x2="-38" y2="-20" stroke="var(--green)" stroke-width="0.5" opacity="0.5"/>
                    <line x1="-20" y1="-20" x2="-8" y2="-20" stroke="var(--dim)" stroke-width="0.5"/>
                    <line x1="8" y1="-20" x2="22" y2="-20" stroke="var(--dim)" stroke-width="0.5"/>
                    <line x1="38" y1="-20" x2="52" y2="-20" stroke="var(--green)" stroke-width="0.5" opacity="0.5"/>
                    <line x1="-30" y1="-10" x2="-45" y2="2" stroke="var(--green)" stroke-width="0.5" opacity="0.5"/>
                    <line x1="0" y1="-10" x2="0" y2="0" stroke="var(--green)" stroke-width="0.5" opacity="0.5"/>
                    <line x1="30" y1="-10" x2="45" y2="2" stroke="var(--red)" stroke-width="0.5"/>
                </g>
                
                <!-- Rotating corner decorations inside hex -->
                <g class="rotating" style="transform-origin: 70px 130px;">
                    <circle cx="70" cy="130" r="15" fill="none" stroke="var(--dim)" stroke-width="0.5" stroke-dasharray="2,4"/>
                </g>
                <g class="rotating" style="transform-origin: 330px 130px;">
                    <circle cx="330" cy="130" r="15" fill="none" stroke="var(--dim)" stroke-width="0.5" stroke-dasharray="2,4"/>
                </g>
            </svg>
        </div>
        
        <!-- BOTTOM BAR -->
        <div class="bottom-bar">
            <div class="pattern-indicator">
                <div class="pattern-dot"></div>
                <span class="pattern-text">PATTERN: BLUE // パターン青</span>
                <span class="pattern-alert">▲ ANGEL ▲</span>
            </div>
        </div>
    </div>
    
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                String(now.getHours()).padStart(2,'0') + ':' +
                String(now.getMinutes()).padStart(2,'0') + ':' +
                String(now.getSeconds()).padStart(2,'0');
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
