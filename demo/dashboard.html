<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NERV Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" 
     xmlns="http://www.w3.org/2000/svg" 
     style="background: #000000; font-family: 'Courier New', 'MS Gothic', monospace;">
    
    <defs>
    <!-- Phosphor glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
    
    <!-- Intense glow for alerts -->
    <filter id="glow-intense" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="4" result="blur1"/>
        <feGaussianBlur stdDeviation="8" result="blur2"/>
        <feMerge>
            <feMergeNode in="blur2"/>
            <feMergeNode in="blur1"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
    
    <!-- Scanline pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
        <rect width="4" height="2" fill="rgba(0,0,0,0.15)"/>
    </pattern>
    
    <!-- Vignette gradient -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
        <stop offset="40%" stop-color="transparent"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0.6)"/>
    </radialGradient>
    
    <!-- Hex clip path for panels -->
    <clipPath id="hex-clip">
        <polygon points="10,0 90,0 100,10 100,90 90,100 10,100 0,90 0,10"/>
    </clipPath>
    
    <!-- Chamfered rectangle -->
    <clipPath id="chamfer-8">
        <polygon points="8,0 calc(100% - 8),0 100%,8 100%,calc(100% - 8) calc(100% - 8),100% 8,100% 0,calc(100% - 8) 0,8"/>
    </clipPath>
</defs>
    
    <!-- Scanline overlay -->
    <rect width="100%" height="100%" fill="url(#scanlines)" opacity="0.5"/>
    
    <!-- Header -->
    <g class="nerv-header">
    <!-- Background gradient -->
    <defs>
        <linearGradient id="header-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#8B0000"/>
            <stop offset="100%" stop-color="#000000"/>
        </linearGradient>
    </defs>
    
    <!-- Header bar -->
    <rect width="1200" height="50" fill="url(#header-grad)"/>
    <line x1="0" y1="50" x2="1200" y2="50" stroke="#FF0000" stroke-width="3"/>
    
    <!-- Corner decorations -->
    <path d="M 0,0 L 30,0 L 25,8 L 8,8 L 8,25 L 0,30 Z" fill="#8B0000"/>
    <path d="M 1200,0 L 1170,0 L 1175,8 L 1192,8 L 1192,25 L 1200,30 Z" fill="#8B0000"/>
    
    <!-- Logo -->
    <text x="20" y="35" fill="#FFFFFF" font-family="'Courier New', monospace" font-size="28" font-weight="bold" letter-spacing="8" filter="url(#glow)">
        NER<tspan fill="#FF0000">V</tspan>
    </text>
    
    <!-- Subtitle -->
    <text x="160" y="32" fill="#666666" font-family="'Courier New', monospace" font-size="10" letter-spacing="2">
        COMMAND CENTER // 司令センター
    </text>
    
    <!-- Status indicators -->
    <g transform="translate(900, 15)">
        <text x="0" y="12" fill="#666666" font-size="9">SYS:</text>
        <text x="30" y="12" fill="#00FF41" font-size="9" filter="url(#glow)">NOMINAL</text>
        <text x="100" y="12" fill="#666666" font-size="9">|</text>
        <text x="110" y="12" fill="#666666" font-size="9">PATTERN:</text>
        <text x="165" y="12" fill="#00FFFF" font-size="9" filter="url(#glow)">BLUE</text>
        <text x="200" y="12" fill="#666666" font-size="9">|</text>
        <text x="210" y="12" fill="#666666" font-size="9">TIME:</text>
        <text x="245" y="12" fill="#00FF41" font-size="9">14:32:07</text>
    </g>
</g>
    
    <!-- Pattern Indicator -->
    <g class="pattern-indicator" transform="translate(0, 50)">
    <rect width="1200" height="30" fill="#000000" stroke="#00FFFF" stroke-width="2"/>
    
    <!-- Pulsing dot -->
    <circle cx="20" cy="15" r="8" fill="#00FFFF">
        <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="15" r="8" fill="none" stroke="#00FFFF" stroke-width="1">
        <animate attributeName="r" values="8;15;8" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
    </circle>
